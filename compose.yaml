services:
  app:
    build:
      context: .
      target: backend
    container_name: deeds-app
    environment:
      FLASK_APP: wsgi_app.py
      PYTHONUNBUFFERED: "1"
    expose:
      - "8000"
    command: >
      sh -c "python -m flask db upgrade &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 60 wsgi_app:application"
    volumes:
      - ./instance:/app/instance
      - ./deeds/static/profile_pics:/app/deeds/static/profile_pics
      - ./deeds/static/post_images:/app/deeds/static/post_images
    restart: unless-stopped

  nginx:
    build:
      context: .
      target: nginx
    container_name: deeds-nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deeds/static/profile_pics:/var/www/app/static/profile_pics
      - ./deeds/static/post_images:/var/www/app/static/post_images
    restart: unless-stopped
