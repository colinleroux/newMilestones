{% extends "layout.html" %}
{% block content %}
<div x-data="dashboard()">
  <div class="grid lg:grid-cols-4 gap-4">
    <div class="lg:col-span-1">
      <template x-if="selectedGoalId !== null">
        <div class="mb-3">
          <button
            class="w-full px-3 py-1.5 text-sm bg-blue-500 text-white rounded hover:bg-blue-600 transition"
            @click="clearGoalFilter"
          >
            Show all current goals & related steps
          </button>
        </div>
      </template>
      <h3 class="text-xl font-semibold mb-2">Your current goals</h3>

      <div class="space-y-3">
        <template x-if="goals.length === 0">
          <div class="p-3 bg-gray-100 text-gray-700 rounded text-sm">
            You haven't created any goals yet.
            <button
              class="px-3 py-1.5 ml-2 text-sm bg-green-600 text-white rounded"
              @click="window.location.href='/goalplanner'"
            >
              +
            </button>
          </div>
        </template>

        <template x-for="goal in goals" :key="goal.id">
          <div
            class="p-3 rounded shadow cursor-pointer hover:bg-gray-100"
            :style="'border-left: 12px solid ' + goal.color"
            @click="selectGoal(goal)"
            :class="[
              selectedGoalId === goal.id ? 'ring-2 ring-offset-1 ring-blue-400' : '',
              goal.progress === 100 ? 'bg-green-100' : ''
            ].join(' ')"
          >
            <div class="font-medium flex justify-between items-center">
              <span x-text="goal.name"></span>
              <span class="text-sm text-gray-600" x-text="goal.progress + '%'"></span>
            </div>

            <div class="w-full bg-gray-200 rounded h-2 mt-1">
              <div class="bg-green-500 h-2 rounded" :style="'width: ' + goal.progress + '%'"></div>
            </div>

            <template x-if="selectedGoalId === goal.id">
              <div class="mt-2 text-gray-600 text-sm">
                <strong>Motivation:</strong> <span x-text="goal.motivation"></span>
              </div>
            </template>

            <template x-if="goal.progress === 100 && !goal.completed">
              <div class="flex items-center justify-end mt-2">
                <input type="checkbox"
                       @change="markGoalCompleted(goal)"
                       class="h-4 w-4 text-green-600 border-gray-300 rounded focus:ring-green-500">
                <label class="ml-2 text-sm text-slate-700">Goal achieved, archive it?</label>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>

    <div class="lg:col-span-3">
      <div class="mb-3 p-3 rounded-lg shadow border border-gray-200">
        <div class="flex justify-between items-center ">
          <div class="flex space-x-2">
            <button class="px-3 py-1.5 text-sm bg-blue-500 text-white rounded" @click="changeWeek(-1)">Prev</button>
            <button class="px-3 py-1.5 text-sm bg-green-500 text-white rounded" @click="changeWeek(0)">This Week</button>
            <button class="px-3 py-1.5 text-sm bg-amber-500 text-white rounded" @click="showCurrentMonth">This Month</button>
            <button class="px-3 py-1.5 text-sm bg-blue-500 text-white rounded" @click="changeWeek(1)">Next</button>
          </div>

          <div class="flex space-x-3">
            <button
              class="px-3 py-1.5 text-sm bg-blue-600 text-white rounded"
              @click="window.location.href='/goalplanner'"
            >
              Goal Manager
            </button>
            <button
              class="px-3 py-1.5 text-sm bg-blue-600 text-white rounded"
              @click="window.location.href='/weeklyplanner'"
            >
              Step Manager
            </button>
          </div>
        </div>
      </div>

      <h2 class="text-lg font-semibold mt-2 text-center" x-text="periodLabel"></h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-4">
        <template x-for="day in days" :key="day.name">
          <div class="p-4 border rounded shadow">
            <h3 class="font-bold mb-2" x-text="day.label"></h3>

            <template x-if="weeklyPlan[day.name]?.length > 0">
              <div>
                <template
                  x-for="step in (weeklyPlan[day.name] || []).filter(s => !selectedGoalId || s.goal_id === selectedGoalId)"
                  :key="`${day.name}-${step.id}`"
                >
                  <div
                    class="mb-3 p-3 rounded-lg shadow border border-gray-200"
                    :style="`border-left: 8px solid ${step.goal_color};`"
                    :class="step.completed ? 'bg-green-50' : 'bg-white'"
                  >
                    <p class="text-base font-semibold text-gray-800" x-text="step.title"></p>

                    <p class="text-sm text-gray-700 mt-1">
                      <span class="font-medium">Goal:</span>
                      <span x-text="step.goal_name"></span>
                    </p>

                    <p class="text-xs text-gray-500 mt-0.5" x-text="formatDate(step.date_for)"></p>

                    <div class="flex items-center space-x-2 mt-2">
                      <input
                        type="checkbox"
                        :checked="step.completed"
                        @change="toggleComplete(step)"
                        class="h-4 w-4 text-green-600 border-gray-300 rounded focus:ring-green-500"
                      >
                      <label class="text-sm text-gray-700" x-text="step.completed ? 'Completed' : 'Mark as complete'"></label>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <template x-if="!weeklyPlan[day.name] || weeklyPlan[day.name].filter(s => !selectedGoalId || s.goal_id === selectedGoalId).length === 0">
              <p class="text-sm text-gray-500 italic">No steps</p>
            </template>
          </div>
        </template>
      </div>
    </div>
  </div>
</div>

<script>
function dashboard() {
  return {
    days: [],
    weeklyPlan: {},
    loading: true,
    weekOffset: 0,
    viewMode: 'week',
    selectedGoalId: null,
    goals: {{ goals | tojson }},

    init() {
      this.generateDays();
      this.fetchSteps();
    },
    changeWeek(offset) {
      this.viewMode = 'week';
      if (offset === 0) {
        this.weekOffset = 0;
      } else {
        this.weekOffset += offset;
      }
      this.generateDays();
      this.fetchSteps();
    },

    showCurrentMonth() {
      this.viewMode = 'month';
      this.generateDays();
      this.fetchSteps();
    },

    clearGoalFilter() {
      this.selectedGoalId = null;
      this.fetchSteps();
    },

    selectGoal(goal) {
      this.selectedGoalId = goal.id;
      this.fetchSteps();
    },

    async markGoalCompleted(goal) {
      try {
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        const res = await fetch(`/api/goals/${goal.id}/complete`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
          },
          body: JSON.stringify({ completed: true })
        });

        if (!res.ok) throw new Error('Failed to update goal');
        this.goals = this.goals.filter(g => g.id !== goal.id);
      } catch (err) {
        console.error(err);
        alert('Could not mark goal as completed.');
      }
    },

    generateDays() {
      const today = new Date();
      if (this.viewMode === 'month') {
        const year = today.getFullYear();
        const month = today.getMonth();
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        const numberOfDays = lastDay.getDate();

        this.days = Array.from({ length: numberOfDays }, (_, i) => {
          const date = new Date(year, month, i + 1);
          const name = date.toISOString().split('T')[0];
          return {
            label: date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }),
            name: name
          };
        });
      } else {
        const monday = new Date(today);
        const dayOfWeek = today.getDay();
        const diffToMonday = (dayOfWeek + 6) % 7;
        monday.setDate(today.getDate() - diffToMonday + this.weekOffset * 7);

        this.days = Array.from({ length: 7 }, (_, i) => {
          const date = new Date(monday);
          date.setDate(monday.getDate() + i);
          const name = date.toISOString().split('T')[0];
          return {
            label: date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }),
            name: name
          };
        });
      }

      this.weeklyPlan = {};
      for (const day of this.days) {
        this.weeklyPlan[day.name] = [];
      }
    },

    fetchSteps() {
      this.loading = true;
      const startDate = this.days[0]?.name;
      const endDate = this.days[6]?.name;
      const goalParam = this.selectedGoalId ? `&goal_id=${this.selectedGoalId}` : "";

      fetch(`/api/steps/range?start=${startDate}&end=${endDate}${goalParam}`)
        .then(res => res.json())
        .then(data => {
          if (!data || !Array.isArray(data.steps)) {
            console.error("Invalid response format:", data);
            return;
          }

          for (const key in this.weeklyPlan) {
            this.weeklyPlan[key] = [];
          }

          for (const step of data.steps) {
            const day = step.date_for;
            if (!this.weeklyPlan[day]) this.weeklyPlan[day] = [];
            this.weeklyPlan[day].push(step);
          }

          this.loading = false;
        });
    },

    async toggleComplete(step) {
      try {
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        const response = await fetch(`/api/steps/${step.id}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
          },
          body: JSON.stringify({ completed: !step.completed })
        });

        if (!response.ok) throw new Error('Failed to update');

        const data = await response.json();
        step.completed = data.completed;
        if (data.reflection !== undefined) step.reflection = data.reflection;
        this.refreshGoalProgress(step.goal_id);
      } catch (err) {
        console.error(err);
        alert('Could not update step status.');
      }
    },

    async refreshGoalProgress(goalId) {
      try {
        const res = await fetch(`/api/goals/${goalId}/progress`);
        if (!res.ok) throw new Error('Failed to fetch progress');
        const data = await res.json();

        const goal = this.goals.find(g => g.id === goalId);
        if (goal) {
          goal.progress = data.progress;
        }
      } catch (err) {
        console.error('Could not refresh goal progress:', err);
      }
    },

    formatDate(dateStr) {
      const options = { weekday: 'short', month: 'short', day: 'numeric' };
      return new Date(dateStr).toLocaleDateString(undefined, options);
    },

    get periodLabel() {
      if (!this.days.length) {
        return '';
      }

      if (this.viewMode === 'month') {
        return new Date(this.days[0].name).toLocaleDateString(undefined, {
          month: 'long',
          year: 'numeric'
        });
      }

      return `Week of ${this.formatDate(this.days[0].name)}`;
    }
  };
}
</script>
{% endblock %}
