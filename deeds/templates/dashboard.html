{% extends "layout.html" %}
{% block content %}
<div x-data="dashboard()">
  <div class="grid lg:grid-cols-4 gap-4">
    <div class="lg:col-span-1">
      <div class="mb-2 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <h3 class="text-xl font-semibold" x-text="sidebarTitle"></h3>
        <div class="flex flex-wrap items-center gap-2">
          <template x-if="selectedGoalId !== null && !showIdeas">
            <button
              class="px-3 py-1.5 text-sm bg-blue-500 text-white rounded hover:bg-blue-600 transition"
              @click="clearGoalFilter"
            >
              All goals
            </button>
          </template>
          <template x-if="!showIdeas && !showCompletedGoals">
            <button
              type="button"
              class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-violet-300 bg-violet-50 text-violet-700 transition hover:bg-violet-100"
              @click="toggleIdeas"
              title="Show contemplated items"
              aria-label="Show contemplated items"
            >
              <span class="text-lg">🧠</span>
            </button>
          </template>
          <template x-if="showIdeas">
            <button
              type="button"
              class="inline-flex items-center gap-2 rounded-full border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
              @click="toggleIdeas"
              title="Back to current goals"
              aria-label="Back to current goals"
            >
              <span aria-hidden="true">←</span>
              <span>Goals</span>
            </button>
          </template>
          <template x-if="!showIdeas && !showCompletedGoals">
            <button
              type="button"
              class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-amber-300 bg-amber-50 text-amber-700 transition hover:bg-amber-100"
              @click="toggleCompletedGoals"
              title="Show completed goals"
              aria-label="Show completed goals"
            >
              <span class="text-lg">🏆</span>
            </button>
          </template>
          <template x-if="!showIdeas && showCompletedGoals">
            <button
              type="button"
              class="inline-flex items-center gap-2 rounded-full border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
              @click="toggleCompletedGoals"
              title="Back to current goals"
              aria-label="Back to current goals"
            >
              <span aria-hidden="true">←</span>
              <span>Goals</span>
            </button>
          </template>
        </div>
      </div>
      <p class="mb-4 text-sm italic text-gray-600" x-text="sidebarHint"></p>

      <div class="space-y-3" x-show="!showIdeas">
        <template x-if="visibleGoals.length === 0">
          <div class="p-3 bg-gray-100 text-gray-700 rounded text-sm">
            <span x-text="showCompletedGoals ? `You haven't completed any goals yet.` : `You haven't created any goals yet.`"></span>
            <template x-if="!showCompletedGoals">
              <button
                class="px-3 py-1.5 ml-2 text-sm bg-green-600 text-white rounded"
                @click="window.location.href='/goalplanner'"
              >
                +
              </button>
            </template>
          </div>
        </template>

        <template x-for="goal in visibleGoals" :key="`${showCompletedGoals ? 'completed' : 'current'}-${goal.id}`">
          <div
            class="p-3 rounded shadow cursor-pointer hover:bg-gray-100"
            :style="'border-left: 12px solid ' + goal.color"
            @click="selectGoal(goal)"
            :class="[
              selectedGoalId === goal.id ? 'ring-2 ring-offset-1 ring-blue-400' : '',
              goal.completed || goal.progress === 100 ? 'bg-green-100' : ''
            ].join(' ')"
          >
            <div class="flex items-center justify-between gap-3 font-medium">
              <span class="min-w-0 break-words" x-text="goal.name"></span>
              <span class="text-sm text-gray-600" x-text="goal.progress + '%'"></span>
            </div>

            <div class="w-full bg-gray-200 rounded h-2 mt-1">
              <div class="bg-green-500 h-2 rounded" :style="'width: ' + goal.progress + '%'"></div>
            </div>

            <template x-if="selectedGoalId === goal.id">
              <div class="mt-2 text-gray-600 text-sm">
                <strong>Motivation:</strong> <span x-text="goal.motivation"></span>
              </div>
            </template>

            <template x-if="goal.progress === 100 && !goal.completed && !showCompletedGoals">
              <div class="flex items-center justify-end mt-2">
                <input type="checkbox"
                       @change="markGoalCompleted(goal)"
                       class="h-4 w-4 text-green-600 border-gray-300 rounded focus:ring-green-500">
                <label class="ml-2 text-sm text-slate-700">Goal achieved, archive it?</label>
              </div>
            </template>
          </div>
        </template>
      </div>

      <div class="space-y-3" x-show="showIdeas">
        <template x-if="ideas.length === 0">
          <div class="rounded-xl bg-violet-50 p-4 text-sm text-violet-800">
            No contemplated items yet. Add a few things you do not want to forget before turning them into goals.
          </div>
        </template>

        <template x-for="idea in ideas" :key="idea.id">
          <div
            class="rounded-xl border border-violet-100 bg-white p-4 shadow cursor-pointer hover:bg-violet-50/50"
            :class="selectedIdea?.id === idea.id ? 'ring-2 ring-offset-1 ring-violet-400' : ''"
            @click="selectIdea(idea)"
          >
            <div class="font-medium text-slate-900" x-text="idea.title"></div>
            <template x-if="idea.notes">
              <p class="mt-2 text-sm text-slate-600 line-clamp-3" x-text="idea.notes"></p>
            </template>
          </div>
        </template>
      </div>
    </div>

    <div class="lg:col-span-3">
      <template x-if="!showIdeas">
      <div>
      <div class="mb-3 p-3 rounded-lg shadow border border-gray-200">
        <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
          <div class="flex flex-wrap gap-2">
            <button class="px-3 py-1.5 text-sm bg-blue-500 text-white rounded" @click="changePeriod(-1)">Prev</button>
            <button class="px-3 py-1.5 text-sm bg-teal-500 text-white rounded" @click="showToday">Today</button>
            <button class="px-3 py-1.5 text-sm bg-green-500 text-white rounded" @click="changeWeek(0)">This Week</button>
            <button class="px-3 py-1.5 text-sm bg-amber-500 text-white rounded" @click="showCurrentMonth">This Month</button>
            <button class="px-3 py-1.5 text-sm bg-blue-500 text-white rounded" @click="changePeriod(1)">Next</button>
          </div>

          <div class="flex flex-wrap gap-2 lg:justify-end">
            <button
              class="px-3 py-1.5 text-sm bg-blue-600 text-white rounded sm:w-auto"
              @click="window.location.href='/goalplanner'"
            >
              Goal Manager
            </button>
            <button
              class="px-3 py-1.5 text-sm bg-blue-600 text-white rounded sm:w-auto"
              @click="window.location.href='/weeklyplanner'"
            >
              Step Manager
            </button>
          </div>
        </div>
      </div>

      <h2 class="mt-2 text-center text-base font-semibold sm:text-lg" x-text="periodLabel"></h2>

      <div
        class="mt-4 grid gap-4"
        :class="{
          'grid-cols-1': viewMode === 'day',
          'grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4': viewMode !== 'day'
        }"
      >
        <template x-for="day in days" :key="day.name">
          <div class="p-4 border rounded shadow" :class="{ 'max-w-none w-full': viewMode === 'day' }">
            <h3 class="font-bold mb-2" x-text="day.label"></h3>

            <template x-if="weeklyPlan[day.name]?.length > 0">
              <div
                :class="{
                  'grid gap-4 md:grid-cols-2 xl:grid-cols-3': viewMode === 'day',
                  'space-y-3': viewMode !== 'day'
                }"
              >
                <template
                  x-for="step in (weeklyPlan[day.name] || []).filter(s => !selectedGoalId || s.goal_id === selectedGoalId)"
                  :key="`${day.name}-${step.id}`"
                >
                  <div
                    class="p-3 rounded-lg shadow border border-gray-200"
                    :style="`border-left: 8px solid ${step.goal_color};`"
                    :class="step.completed ? 'bg-green-50' : 'bg-white'"
                  >
                    <p class="text-base font-semibold text-gray-800" x-text="step.title"></p>

                    <p class="text-sm text-gray-700 mt-1">
                      <span class="font-medium">Goal:</span>
                      <span x-text="step.goal_name"></span>
                    </p>

                    <p class="text-xs text-gray-500 mt-0.5" x-text="formatDate(step.date_for)"></p>
                    <template x-if="step.log_activity">
                      <div class="mt-2 flex flex-wrap gap-2 text-xs text-gray-600">
                        <span class="rounded-full bg-teal-50 px-2 py-1 text-teal-700">Tracked activity</span>
                        <template x-if="step.duration_seconds">
                          <span class="rounded-full bg-slate-100 px-2 py-1" x-text="formatDuration(step.duration_seconds)"></span>
                        </template>
                        <template x-if="step.distance_m">
                          <span class="rounded-full bg-slate-100 px-2 py-1" x-text="formatDistance(step.distance_m)"></span>
                        </template>
                        <template x-if="step.sets">
                          <span class="rounded-full bg-slate-100 px-2 py-1" x-text="`${step.sets} sets`"></span>
                        </template>
                        <template x-if="step.reps">
                          <span class="rounded-full bg-slate-100 px-2 py-1" x-text="`${step.reps} reps`"></span>
                        </template>
                      </div>
                    </template>

                    <div class="mt-2 flex items-start gap-2">
                      <input
                        type="checkbox"
                        :checked="step.completed"
                        @change="toggleComplete(step)"
                        class="h-4 w-4 text-green-600 border-gray-300 rounded focus:ring-green-500"
                      >
                      <label class="text-sm text-gray-700" x-text="step.completed ? 'Completed' : 'Mark as complete'"></label>
                    </div>

                    <template x-if="step.completed">
                      <div class="mt-3 rounded border border-green-100 bg-white/80 p-3">
                        <div class="flex flex-wrap items-center gap-2">
                          <template x-if="!step.reflection">
                            <button
                              type="button"
                              class="text-sm font-medium text-blue-600 hover:underline"
                              @click="toggleReflectionEditor(step)"
                            >
                              Add reflection
                            </button>
                          </template>

                          <template x-if="step.reflection">
                            <button
                              type="button"
                              class="inline-flex h-8 w-8 items-center justify-center rounded-full border border-blue-200 text-blue-600 transition hover:bg-blue-50"
                              @click="toggleReflectionEditor(step)"
                              title="Edit reflection"
                              aria-label="Edit reflection"
                            >
                              <span class="text-sm">✎</span>
                            </button>
                          </template>

                          <template x-if="step.log_activity && !step.logged_activity_id">
                            <a
                              :href="`/activities/logs?step_id=${step.id}`"
                              class="text-sm font-medium text-teal-700 hover:underline"
                            >
                              Add to log
                            </a>
                          </template>

                          <template x-if="step.logged_activity_id">
                            <a
                              :href="`/activities/logs?edit=${step.logged_activity_id}`"
                              class="text-sm font-medium text-teal-700 hover:underline"
                            >
                              View log
                            </a>
                          </template>
                        </div>

                        <template x-if="step.reflection && !step.showReflectionEditor">
                          <p class="mt-2 text-sm text-gray-700 whitespace-pre-line" x-text="step.reflection"></p>
                        </template>

                        <template x-if="step.showReflectionEditor">
                          <div class="mt-2 space-y-2">
                            <textarea
                              x-model="step.reflectionDraft"
                              rows="3"
                              class="w-full rounded border border-gray-300 p-2 text-sm text-gray-700"
                              placeholder="How did this feel? Was it easy? Any little lessons learned?"
                            ></textarea>
                            <div class="flex flex-wrap items-center gap-2">
                              <button
                                type="button"
                                class="rounded bg-green-600 px-3 py-1.5 text-sm text-white hover:bg-green-700"
                                @click="saveReflection(step)"
                              >
                                Save reflection
                              </button>
                              <button
                                type="button"
                                class="rounded bg-gray-200 px-3 py-1.5 text-sm text-gray-700 hover:bg-gray-300"
                                @click="cancelReflection(step)"
                              >
                                Cancel
                              </button>
                            </div>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>

            <template x-if="!weeklyPlan[day.name] || weeklyPlan[day.name].filter(s => !selectedGoalId || s.goal_id === selectedGoalId).length === 0">
              <p class="text-sm text-gray-500 italic">No steps</p>
            </template>
          </div>
        </template>
      </div>
      </div>
      </template>

      <template x-if="showIdeas">
        <div class="rounded-2xl border border-violet-100 bg-white p-6 shadow-sm">
          <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <h2 class="text-2xl font-bold text-slate-900">Contemplated items</h2>
              <p class="mt-2 text-sm text-slate-600">Capture ideas, intentions, and possible next priorities before you commit them to goals and steps.</p>
            </div>
            <button
              type="button"
              class="rounded-full bg-violet-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-violet-700"
              @click="startAddIdea"
            >
              Add item
            </button>
          </div>

          <template x-if="addingIdea || editingIdea">
            <div class="rounded-2xl border border-violet-100 bg-violet-50/60 p-4">
              <div class="space-y-4">
                <div>
                  <label class="mb-2 block text-sm font-medium text-slate-700">Title</label>
                  <input type="text" x-model="ideaForm.title" class="w-full rounded-xl border border-violet-200 px-4 py-3 text-slate-800 focus:border-violet-400 focus:outline-none" placeholder="What are you considering?">
                </div>
                <div>
                  <label class="mb-2 block text-sm font-medium text-slate-700">Notes</label>
                  <textarea x-model="ideaForm.notes" rows="4" class="w-full rounded-xl border border-violet-200 px-4 py-3 text-slate-800 focus:border-violet-400 focus:outline-none" placeholder="Any context, priorities, or reasons this matters?"></textarea>
                </div>
                <div class="flex flex-wrap gap-2">
                  <button type="button" class="rounded-full bg-violet-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-violet-700" @click="saveIdea">Save item</button>
                  <button type="button" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50" @click="resetIdeaForm">Cancel</button>
                </div>
              </div>
            </div>
          </template>

          <template x-if="selectedIdea && !addingIdea && !editingIdea">
            <div class="rounded-2xl border border-violet-100 bg-white p-5 shadow-sm">
              <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
                <div>
                  <h3 class="text-xl font-semibold text-slate-900" x-text="selectedIdea.title"></h3>
                  <p class="mt-1 text-xs uppercase tracking-wide text-violet-700">Contemplated item</p>
                </div>
                <div class="flex flex-wrap gap-2">
                  <button type="button" class="rounded-full bg-green-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-green-700" @click="convertIdeaToGoal(selectedIdea)">Convert to goal</button>
                  <button type="button" class="rounded-full bg-blue-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-600" @click="editIdea(selectedIdea)">Edit</button>
                  <button type="button" class="rounded-full bg-red-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-red-600" @click="deleteIdea(selectedIdea)">Delete</button>
                </div>
              </div>
              <p class="whitespace-pre-line text-slate-700" x-text="selectedIdea.notes || 'No notes added yet.'"></p>
            </div>
          </template>

          <template x-if="!selectedIdea && !addingIdea && !editingIdea">
            <div class="rounded-2xl border border-dashed border-violet-200 bg-violet-50/40 p-8 text-center text-sm text-slate-600">
              Select an item from the list, or add a new one to capture something you are still thinking through.
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>
</div>

<script>
function dashboard() {
  return {
    days: [],
    weeklyPlan: {},
    loading: true,
    dayOffset: 0,
    weekOffset: 0,
    monthOffset: 0,
    viewMode: 'week',
    selectedGoalId: null,
    goals: {{ goals | tojson }},
    completedGoals: {{ completed_goals | tojson }},
    showCompletedGoals: false,
    showIdeas: false,
    ideas: [],
    selectedIdea: null,
    addingIdea: false,
    editingIdea: false,
    ideaForm: { id: null, title: '', notes: '' },

    init() {
      this.generateDays();
      this.fetchSteps();
      this.fetchIdeas();
    },

    toLocalDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    },

    changePeriod(offset) {
      if (this.viewMode === 'day') {
        this.dayOffset += offset;
      } else if (this.viewMode === 'month') {
        this.monthOffset += offset;
      } else {
        this.weekOffset += offset;
      }
      this.generateDays();
      this.fetchSteps();
    },

    changeWeek(offset) {
      this.dayOffset = 0;
      this.viewMode = 'week';
      this.monthOffset = 0;
      if (offset === 0) {
        this.weekOffset = 0;
      } else {
        this.weekOffset += offset;
      }
      this.generateDays();
      this.fetchSteps();
    },

    showCurrentMonth() {
      this.dayOffset = 0;
      this.viewMode = 'month';
      this.monthOffset = 0;
      this.generateDays();
      this.fetchSteps();
    },

    showToday() {
      this.viewMode = 'day';
      this.dayOffset = 0;
      this.generateDays();
      this.fetchSteps();
    },

    clearGoalFilter() {
      this.selectedGoalId = null;
      this.fetchSteps();
    },

    selectGoal(goal) {
      this.selectedGoalId = goal.id;
      this.showIdeas = false;
      this.fetchSteps();
    },

    toggleCompletedGoals() {
      this.showCompletedGoals = !this.showCompletedGoals;
      this.showIdeas = false;
      this.selectedGoalId = null;
      this.fetchSteps();
    },

    toggleIdeas() {
      this.showIdeas = !this.showIdeas;
      this.showCompletedGoals = false;
      this.selectedGoalId = null;
      if (this.showIdeas) {
        this.fetchIdeas();
      }
    },

    async fetchIdeas() {
      try {
        const res = await fetch('/api/ideas');
        const data = await res.json();
        this.ideas = data.ideas || [];
        if (this.selectedIdea) {
          this.selectedIdea = this.ideas.find(idea => idea.id === this.selectedIdea.id) || null;
        }
      } catch (err) {
        console.error('Failed to fetch ideas:', err);
      }
    },

    selectIdea(idea) {
      this.selectedIdea = idea;
      this.addingIdea = false;
      this.editingIdea = false;
      this.ideaForm = { id: null, title: '', notes: '' };
    },

    startAddIdea() {
      this.selectedIdea = null;
      this.addingIdea = true;
      this.editingIdea = false;
      this.ideaForm = { id: null, title: '', notes: '' };
    },

    editIdea(idea) {
      this.selectedIdea = idea;
      this.addingIdea = false;
      this.editingIdea = true;
      this.ideaForm = { id: idea.id, title: idea.title, notes: idea.notes || '' };
    },

    resetIdeaForm() {
      this.ideaForm = { id: null, title: '', notes: '' };
      this.addingIdea = false;
      this.editingIdea = false;
    },

    async saveIdea() {
      const payload = {
        title: (this.ideaForm.title || '').trim(),
        notes: this.ideaForm.notes || ''
      };
      if (!payload.title) return;

      const url = this.editingIdea ? `/api/ideas/${this.ideaForm.id}` : '/api/ideas';
      const method = this.editingIdea ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
          },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('Failed to save idea');
        const saved = await res.json();
        await this.fetchIdeas();
        this.selectedIdea = this.ideas.find(idea => idea.id === saved.id) || saved;
        this.resetIdeaForm();
      } catch (err) {
        console.error(err);
        alert('Could not save contemplated item.');
      }
    },

    async deleteIdea(idea) {
      if (!confirm('Delete this contemplated item?')) return;
      try {
        const res = await fetch(`/api/ideas/${idea.id}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
          }
        });
        if (!res.ok) throw new Error('Failed to delete idea');
        await this.fetchIdeas();
        if (this.selectedIdea?.id === idea.id) {
          this.selectedIdea = null;
        }
      } catch (err) {
        console.error(err);
        alert('Could not delete contemplated item.');
      }
    },

    convertIdeaToGoal(idea) {
      const encodedName = encodeURIComponent(idea.title || '');
      window.location.href = `/goalplanner?name=${encodedName}`;
    },

    async markGoalCompleted(goal) {
      try {
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        const res = await fetch(`/api/goals/${goal.id}/complete`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
          },
          body: JSON.stringify({ completed: true })
        });

        if (!res.ok) throw new Error('Failed to update goal');
        this.goals = this.goals.filter(g => g.id !== goal.id);
        this.completedGoals.unshift({ ...goal, completed: true, progress: 100 });
        if (this.showCompletedGoals) {
          this.selectedGoalId = null;
        }
      } catch (err) {
        console.error(err);
        alert('Could not mark goal as completed.');
      }
    },

    generateDays() {
      const today = new Date();
      if (this.viewMode === 'day') {
        const date = new Date(today);
        date.setDate(today.getDate() + this.dayOffset);
        const name = this.toLocalDateString(date);
        this.days = [{
          label: date.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' }),
          name: name
        }];
      } else if (this.viewMode === 'month') {
        const firstDay = new Date(today.getFullYear(), today.getMonth() + this.monthOffset, 1);
        const lastDay = new Date(firstDay.getFullYear(), firstDay.getMonth() + 1, 0);
        const numberOfDays = lastDay.getDate();

        this.days = Array.from({ length: numberOfDays }, (_, i) => {
          const date = new Date(firstDay.getFullYear(), firstDay.getMonth(), i + 1);
          const name = this.toLocalDateString(date);
          return {
            label: date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }),
            name: name
          };
        });
      } else {
        const monday = new Date(today);
        const dayOfWeek = today.getDay();
        const diffToMonday = (dayOfWeek + 6) % 7;
        monday.setDate(today.getDate() - diffToMonday + this.weekOffset * 7);

        this.days = Array.from({ length: 7 }, (_, i) => {
          const date = new Date(monday);
          date.setDate(monday.getDate() + i);
          const name = this.toLocalDateString(date);
          return {
            label: date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }),
            name: name
          };
        });
      }

      this.weeklyPlan = {};
      for (const day of this.days) {
        this.weeklyPlan[day.name] = [];
      }
    },

    fetchSteps() {
      this.loading = true;
      const startDate = this.days[0]?.name;
      const endDate = this.days[this.days.length - 1]?.name;
      const goalParam = this.selectedGoalId ? `&goal_id=${this.selectedGoalId}` : "";

      fetch(`/api/steps/range?start=${startDate}&end=${endDate}${goalParam}`)
        .then(res => res.json())
        .then(data => {
          if (!data || !Array.isArray(data.steps)) {
            console.error("Invalid response format:", data);
            return;
          }

          for (const key in this.weeklyPlan) {
            this.weeklyPlan[key] = [];
          }

          for (const step of data.steps) {
            const day = step.date_for;
            if (!this.weeklyPlan[day]) this.weeklyPlan[day] = [];
            step.showReflectionEditor = false;
            step.reflectionDraft = step.reflection || '';
            this.weeklyPlan[day].push(step);
          }

          this.loading = false;
        });
    },

    async toggleComplete(step) {
      try {
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        const response = await fetch(`/api/steps/${step.id}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
          },
          body: JSON.stringify({ completed: !step.completed })
        });

        if (!response.ok) throw new Error('Failed to update');

        const data = await response.json();
        step.completed = data.completed;
        if (data.reflection !== undefined) step.reflection = data.reflection;
        step.reflectionDraft = data.reflection || step.reflectionDraft || '';
        step.showReflectionEditor = data.completed;
        this.refreshGoalProgress(step.goal_id);
      } catch (err) {
        console.error(err);
        alert('Could not update step status.');
      }
    },

    async refreshGoalProgress(goalId) {
      try {
        const res = await fetch(`/api/goals/${goalId}/progress`);
        if (!res.ok) throw new Error('Failed to fetch progress');
        const data = await res.json();

        const goal = this.goals.find(g => g.id === goalId);
        if (goal) {
          goal.progress = data.progress;
        }
      } catch (err) {
        console.error('Could not refresh goal progress:', err);
      }
    },

    formatDate(dateStr) {
      const options = { weekday: 'short', month: 'short', day: 'numeric' };
      const [year, month, day] = dateStr.split('-').map(Number);
      return new Date(year, month - 1, day).toLocaleDateString(undefined, options);
    },

    formatDuration(seconds) {
      if (!seconds) return '';
      const minutes = seconds / 60;
      return `${Number(minutes.toFixed(2)).toString()} min`;
    },

    formatDistance(distanceM) {
      if (!distanceM) return '';
      return `${Number((distanceM / 1000).toFixed(2)).toString()} km`;
    },

    formatMonthYear(dateStr) {
      const [year, month, day] = dateStr.split('-').map(Number);
      return new Date(year, month - 1, day).toLocaleDateString(undefined, {
        month: 'long',
        year: 'numeric'
      });
    },

    toggleReflectionEditor(step) {
      step.showReflectionEditor = !step.showReflectionEditor;
      step.reflectionDraft = step.reflection || '';
    },

    cancelReflection(step) {
      step.showReflectionEditor = false;
      step.reflectionDraft = step.reflection || '';
    },

    async saveReflection(step) {
      try {
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        const response = await fetch(`/api/steps/${step.id}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
          },
          body: JSON.stringify({ reflection: step.reflectionDraft })
        });

        if (!response.ok) throw new Error('Failed to save reflection');

        const data = await response.json();
        step.reflection = data.reflection || '';
        step.reflectionDraft = step.reflection;
        step.showReflectionEditor = false;
      } catch (err) {
        console.error(err);
        alert('Could not save reflection.');
      }
    },

    get visibleGoals() {
      return this.showCompletedGoals ? this.completedGoals : this.goals;
    },

    get sidebarTitle() {
      if (this.showIdeas) {
        return 'Contemplated items';
      }
      return this.showCompletedGoals ? 'Completed goals' : 'Current goals';
    },

    get sidebarHint() {
      if (this.showIdeas) {
        return 'Capture and revisit ideas before turning them into goals.';
      }
      if (this.selectedGoalId !== null) {
        return 'Showing steps for the selected goal.';
      }

      if (this.showCompletedGoals) {
        return 'Browse your achieved goals.';
      }

      return 'Showing all current goals.';
    },

    get periodLabel() {
      if (!this.days.length) {
        return '';
      }

      if (this.viewMode === 'month') {
        return this.formatMonthYear(this.days[0].name);
      }

      if (this.viewMode === 'day') {
        const prefix = this.dayOffset === 0 ? 'Today' : 'Day';
        return `${prefix}: ${this.formatDate(this.days[0].name)}`;
      }

      return `Week of ${this.formatDate(this.days[0].name)}`;
    }
  };
}
</script>
