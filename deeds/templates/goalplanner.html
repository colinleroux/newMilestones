{% extends "layout.html" %}

{% block content %}
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">Manage your goals</h1>
  <a href="{{ url_for('goals.dashboard') }}"
     class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition">
    Dashboard
  </a>
</div>
<div x-data="goalPage()" class="flex flex-col gap-6 lg:h-screen lg:flex-row">
  <div class="w-full rounded-2xl border border-slate-200 bg-gray-100 p-4 lg:w-1/3 lg:overflow-y-auto xl:w-1/4">
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-lg font-bold">Your Goals</h2>
      <button class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-lg" @click="startAddGoal" title="Add Goal">+</button>
    </div>
    <p class="italic text-sm text-gray-600 mb-4">Select a goal to edit</p>

    <h2 class="text-md font-semibold text-gray-700 mb-1">Current Goals</h2>
    <template x-if="goals.length === 0">
      <p class="text-sm text-gray-500 italic mb-2">No current goals</p>
    </template>
    <template x-for="goal in goals" :key="goal.id">
      <div class="bg-white rounded-xl shadow p-4 border-l-8 cursor-pointer hover:bg-gray-50 transition mb-2"
           :style="`border-left-color: ${goal.color}`"
           :class="selectedGoal?.id === goal.id ? 'ring-2 ring-blue-400' : ''"
           @click="selectGoal(goal)">
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-semibold" x-text="goal.name"></h3>
          <span class="text-sm text-gray-500" x-text="`${goal.progress || 0}%`"></span>
        </div>
      </div>
    </template>

    <h2 class="text-md font-semibold text-gray-500 mt-4 mb-1">Completed Goals</h2>
    <template x-if="completedGoals.length === 0">
      <p class="text-sm text-gray-400 italic mb-2">No completed goals</p>
    </template>
    <template x-for="goal in completedGoals" :key="'completed-' + goal.id">
      <div class="bg-gray-200 rounded-xl shadow p-4 border-l-8 cursor-pointer opacity-70 hover:opacity-100 transition mb-2"
           :style="`border-left-color: ${goal.color}`"
           @click="selectGoal(goal)">
        <div class="flex justify-between items-center">
          <h3 class="text-lg font-semibold" x-text="goal.name"></h3>
          <label class="flex items-center space-x-1 text-xs text-green-700 cursor-pointer">
            <input type="checkbox" checked @change="markGoalIncomplete(goal)" class="form-checkbox h-4 w-4 text-green-600 border-gray-300 rounded">
            <span>Achieved</span>
          </label>
        </div>
      </div>
    </template>
  </div>

  <div class="w-full rounded-2xl bg-white p-4 shadow-sm lg:w-2/3 lg:overflow-y-auto lg:p-6 xl:w-3/4">
    <template x-if="selectedGoal">
      <div>
        <div class="mb-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
          <div class="flex items-center space-x-3">
            <div class="w-4 h-10 rounded-l" :style="`background-color: ${selectedGoal.color}`"></div>
            <h2 class="text-2xl font-bold" x-text="selectedGoal.name"></h2>
          </div>
          <div class="flex flex-wrap gap-2">
            <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded" @click="editGoal(selectedGoal)">Edit Goal</button>
            <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded" @click="deleteGoal(selectedGoal)">Delete Goal</button>
            <button class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded" @click="startAddGoal">New Goal</button>
          </div>
        </div>

        <template x-if="editingGoal || addingGoal">
          <div class="bg-white p-4 rounded shadow space-y-4">
            <input type="text" x-model="goalForm.name" placeholder="Goal name" class="border p-2 w-full rounded" />
            <input type="text" x-model="goalForm.motivation" placeholder="Why are you pursuing this goal?" class="border p-2 w-full rounded" />

            <div class="flex flex-wrap gap-2">
              <template x-for="color in availableColors" :key="color">
                <div :style="`background-color: ${color}`"
                     class="w-6 h-6 rounded-full cursor-pointer border-2"
                     :class="{'border-black': goalForm.color === color}"
                     @click="goalForm.color = color"></div>
              </template>
            </div>

            <div class="flex space-x-2">
              <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded" @click="saveGoal">Save</button>
              <button class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded" @click="resetGoalForm">Cancel</button>
            </div>
          </div>
        </template>

        <template x-if="!editingGoal && !addingGoal">
          <div>
            <h3 class="text-xl font-semibold mb-2 mt-6">Goal summary</h3>
            <div class="rounded border bg-white p-4 shadow space-y-3">
              <div>
                <div class="text-sm font-medium text-gray-500">Motivation</div>
                <div class="text-gray-800" x-text="selectedGoal.motivation || 'No motivation added yet.'"></div>
              </div>
              <div>
                <div class="text-sm font-medium text-gray-500">Progress</div>
                <div class="text-gray-800" x-text="`${selectedGoal.progress || 0}% complete`"></div>
              </div>
              <template x-if="!selectedGoal.completed">
                <a :href="`{{ url_for('goals.weeklyplanner') }}?goal_id=${selectedGoal.id}`" class="inline-block text-blue-600 hover:underline text-sm">
                  Plan steps for this goal
                </a>
              </template>
              <template x-if="selectedGoal.completed">
                <div class="flex flex-col gap-2 rounded border border-gray-200 bg-gray-50 p-3 text-sm text-gray-600 sm:flex-row sm:items-center sm:justify-between">
                  <p>This goal is completed. To add more steps, mark it as not achieved.</p>
                  <label class="flex items-center gap-2 text-sm font-medium text-green-700 cursor-pointer">
                    <input type="checkbox" checked @change="markGoalIncomplete(selectedGoal)" class="form-checkbox h-4 w-4 text-green-600 border-gray-300 rounded">
                    <span>Achieved</span>
                  </label>
                </div>
              </template>
            </div>

            <template x-if="selectedGoal.completed">
              <div class="mt-6 rounded border bg-white p-4 shadow">
                <h4 class="text-lg font-semibold mb-3">Completed steps</h4>
                <template x-if="selectedGoal.completed_steps && selectedGoal.completed_steps.length">
                  <ul class="space-y-2">
                    <template x-for="step in selectedGoal.completed_steps" :key="step.id">
                      <li class="rounded border border-gray-100 px-3 py-3">
                        <div class="flex items-center justify-between gap-3">
                          <span class="text-gray-800 font-medium" x-text="step.title"></span>
                          <span class="text-sm text-gray-500" x-text="formatCompletedDate(step)"></span>
                        </div>
                        <template x-if="step.reflection">
                          <p class="mt-2 text-sm text-gray-600 whitespace-pre-line" x-text="step.reflection"></p>
                        </template>
                      </li>
                    </template>
                  </ul>
                </template>
                <template x-if="!selectedGoal.completed_steps || !selectedGoal.completed_steps.length">
                  <p class="text-sm text-gray-500 italic">No completed steps recorded.</p>
                </template>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>

    <template x-if="!selectedGoal && !addingGoal">
      <div class="mt-12 text-center italic text-gray-500 lg:mt-20">Select the goal you wish to edit.</div>
    </template>

    <template x-if="!selectedGoal && addingGoal">
      <div class="bg-white p-4 rounded shadow space-y-4">
        <input type="text" x-model="goalForm.name" placeholder="Goal name" class="border p-2 w-full rounded" />
        <input type="text" x-model="goalForm.motivation" placeholder="Why are you pursuing this goal?" class="border p-2 w-full rounded" />

        <div class="flex flex-wrap gap-2">
          <template x-for="color in availableColors" :key="color">
            <div :style="`background-color: ${color}`"
                 class="w-6 h-6 rounded-full cursor-pointer border-2"
                 :class="{'border-black': goalForm.color === color}"
                 @click="goalForm.color = color"></div>
          </template>
        </div>

        <div class="flex space-x-2">
          <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded" @click="saveGoal">Save</button>
          <button class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded" @click="resetGoalForm">Cancel</button>
        </div>
      </div>
    </template>
  </div>
</div>

<script>
function goalPage() {
  return {
    csrfToken: document.querySelector('meta[name="csrf-token"]').getAttribute('content'),
    goals: [],
    completedGoals: [],
    selectedGoal: null,
    addingGoal: false,
    editingGoal: false,
    initialGoalName: {{ initial_goal_name | tojson }},
    goalForm: { id: null, name: '', color: '', motivation: '' },
    availableColors: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'],

    async init() {
      await this.fetchGoals();
      if (this.initialGoalName) {
        this.startAddGoal(this.initialGoalName);
      }
    },

    async fetchGoals() {
      try {
        const res = await fetch('/api/goals/full');
        const data = await res.json();
        this.goals = data.current_goals;
        this.completedGoals = data.completed_goals;
      } catch (err) {
        console.error('Failed to fetch goals:', err);
      }
    },

    async markGoalIncomplete(goal) {
      try {
        const res = await fetch(`/api/goals/${goal.id}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': this.csrfToken
          },
          body: JSON.stringify({ completed: false })
        });

        if (!res.ok) throw new Error('Failed to update goal');

        this.completedGoals = this.completedGoals.filter(g => g.id !== goal.id);
        goal.completed = false;
        this.goals.push(goal);
      } catch (err) {
        console.error('Error marking goal incomplete:', err);
        alert('Failed to unmark goal as achieved.');
      }
    },

    selectGoal(goal) {
      this.selectedGoal = goal;
      this.resetGoalForm();
    },

    formatCompletedDate(step) {
      const dateValue = step.completed_at || step.date_for;
      if (!dateValue) return 'Date unavailable';
      return new Date(dateValue).toLocaleDateString(undefined, {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    },

    startAddGoal(prefilledName = '') {
      this.selectedGoal = null;
      this.resetGoalForm();
      this.addingGoal = true;
      this.goalForm.name = prefilledName;
      if (!this.goalForm.color) {
        this.goalForm.color = this.availableColors[0];
      }
    },

    editGoal(goal) {
      this.goalForm = { ...goal };
      this.editingGoal = true;
    },

    resetGoalForm() {
      this.goalForm = { id: null, name: '', color: '', motivation: '' };
      this.addingGoal = false;
      this.editingGoal = false;
    },

    async saveGoal() {
      if (!this.goalForm.name || !this.goalForm.color) return;

      try {
        let res;
        if (this.editingGoal) {
          res = await fetch(`/api/goals/${this.goalForm.id}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': this.csrfToken
            },
            body: JSON.stringify({
              name: this.goalForm.name,
              description: '',
              color: this.goalForm.color,
              motivation: this.goalForm.motivation
            })
          });
          const updated = await res.json();
          const idx = this.goals.findIndex(g => g.id === updated.id);
          this.goals.splice(idx, 1, updated);
          this.selectedGoal = updated;
        } else {
          res = await fetch('/api/goals', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': this.csrfToken
            },
            body: JSON.stringify({
              name: this.goalForm.name,
              description: '',
              color: this.goalForm.color,
              motivation: this.goalForm.motivation
            })
          });
          const created = await res.json();
          this.goals.push(created);
          this.selectedGoal = created;
        }

        this.resetGoalForm();
      } catch (err) {
        console.error('Failed to save goal:', err);
      }
    },

    async deleteGoal(goal) {
      if (!confirm("Are you sure you want to delete this goal?")) return;
      try {
        await fetch(`/api/goals/${goal.id}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': this.csrfToken
          }
        });
        this.goals = this.goals.filter(g => g.id !== goal.id);
        this.completedGoals = this.completedGoals.filter(g => g.id !== goal.id);
        if (this.selectedGoal?.id === goal.id) {
          this.selectedGoal = null;
        }
      } catch (err) {
        console.error('Failed to delete goal:', err);
      }
    }
  };
}
</script>
{% endblock %}
