{% extends "layout.html" %}

{% block content %}
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">🎯 Manage you goals</h1>
  <a href="{{ url_for('goals.dashboard') }}"
     class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition">
    Dashboard
  </a>
</div>
<div x-data="goalPage()" class="flex h-screen">
  <!-- Left Panel: Goals List -->
  <div class="w-1/4 bg-gray-100 p-4 border-r overflow-y-auto">

    <div class="flex items-center justify-between mb-2">
      <h2 class="text-lg font-bold">Your Goals</h2>
      <button
        class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-lg"
        @click="startAddGoal"
        title="Add Goal"
      >
        +
      </button>
    </div>
    <p class="italic text-sm text-gray-600 mb-4">Select a goal to edit</p>
   <!-- Current Goals -->
<h2 class="text-md font-semibold text-gray-700 mb-1">Current Goals</h2>
<template x-if="goals.length === 0">
  <p class="text-sm text-gray-500 italic mb-2">No current goals</p>
</template>
<template x-for="goal in goals" :key="goal.id">
  <div
    class="bg-white rounded-xl shadow p-4 border-l-8 cursor-pointer hover:bg-gray-50 transition mb-2"
    :style="`border-left-color: ${goal.color}`"
    :class="selectedGoal?.id === goal.id ? 'ring-2 ring-blue-400' : ''"
    @click="selectGoal(goal)"
  >
    <h3 class="text-lg font-semibold" x-text="goal.name"></h3>
  </div>
</template>

<!-- Completed Goals -->
<h2 class="text-md font-semibold text-gray-500 mt-4 mb-1">Completed Goals</h2>
<template x-if="completedGoals.length === 0">
  <p class="text-sm text-gray-400 italic mb-2">No completed goals</p>
</template>
<template x-for="goal in completedGoals" :key="'completed-' + goal.id">
  <div
    class="bg-gray-200 rounded-xl shadow p-4 border-l-8 cursor-pointer opacity-70 hover:opacity-100 transition mb-2"
    :style="`border-left-color: ${goal.color}`"
    @click="selectGoal(goal)"
  >
    <div class="flex justify-between items-center">
  <h3 class="text-lg font-semibold" x-text="goal.name"></h3>
  <label class="flex items-center space-x-1 text-xs text-green-700 cursor-pointer">
    <input
      type="checkbox"
      checked
      @change="markGoalIncomplete(goal)"
      class="form-checkbox h-4 w-4 text-green-600 border-gray-300 rounded"
    >
    <span>Achieved</span>
  </label>
</div>
  </div>
</template>

  </div>

  <!-- Right Panel: Goal Details or Form -->
  <div class="w-3/4 p-6 overflow-y-auto">
  <!-- When a goal is selected -->
  <template x-if="selectedGoal">
    <div>
      <!-- Header: Goal Title with Color and Action Buttons -->
      <div class="flex justify-between items-center mb-4">
        <div class="flex items-center space-x-3">
          <div class="w-4 h-10 rounded-l" :style="`background-color: ${selectedGoal.color}`"></div>
          <h2 class="text-2xl font-bold" x-text="selectedGoal.name"></h2>
        </div>
        <div class="space-x-2">
          <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded" @click="editGoal(selectedGoal)">Edit Goal</button>
          <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded" @click="deleteGoal(selectedGoal)">Delete Goal</button>
          <button class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded" @click="startAddGoal">New Goal</button>
        </div>
      </div>

    <!-- Milestone Allocation Status Block -->
<div class="flex items-center space-x-4 mb-6" x-show="selectedGoal">
  <h2 class="text-large font-bold" x-text="'Goal: ' + selectedGoal.name"></h2>

  <template x-if="selectedGoal && Array.isArray(selectedGoal.milestones)">
    <div class="flex items-center space-x-2">
      <span class="w-4 h-4 rounded-full"
            :class="(selectedGoal.milestones.reduce((sum, m) => sum + (m.percentage || 0), 0) === 100) ? 'bg-green-500' : 'bg-red-500'">
      </span>
      <span class="text-sm font-medium text-gray-700"
            x-text="(selectedGoal.milestones.reduce((sum, m) => sum + (m.percentage || 0), 0) === 100)
                      ? 'Goal Milestones Fully Allocated'
                      : 'Goal Milestones Incomplete Allocation'">
      </span>
    </div>
  </template>
</div>

        <!-- Show Edit/Add Goal Form -->
        <template x-if="editingGoal || addingGoal">
          <div class="bg-white p-4 rounded shadow space-y-4">
            <input type="text" x-model="goalForm.name" placeholder="Goal name" class="border p-2 w-full rounded" />
            <input type="text" x-model="goalForm.motivation" placeholder="Why are you pursuing this goal?" class="border p-2 w-full rounded" />

            <label class="flex items-center space-x-2">
              <input type="checkbox" x-model="goalForm.has_milestones" class="accent-green-500" />
              <span>Has milestones?</span>
            </label>

            <div class="flex flex-wrap gap-2">
              <template x-for="color in availableColors" :key="color">
                <div
                  :style="`background-color: ${color}`"
                  class="w-6 h-6 rounded-full cursor-pointer border-2"
                  :class="{'border-black': goalForm.color === color}"
                  @click="goalForm.color = color"
                ></div>
              </template>
            </div>

            <div class="flex space-x-2">
              <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded" @click="saveGoal">Save</button>
              <button class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded" @click="resetGoalForm">Cancel</button>
            </div>
          </div>
        </template>

        <!-- Show Milestones if not editing/adding -->
        <template x-if="!editingGoal && !addingGoal">
          <div>
            <h3 class="text-xl font-semibold mb-2 mt-6">Milestones</h3>
            <ul class="space-y-3">
              <template x-if="selectedGoal.milestones?.length">
                <template x-for="milestone in selectedGoal.milestones" :key="milestone.id">
                  <li class="p-3 border rounded bg-white shadow">
                    <div class="flex justify-between items-start">
                      <div>
                        <div class="font-semibold" x-text="milestone.name"></div>
                        <div class="text-sm text-gray-500" x-text="'Deadline: ' + milestone.deadline"></div>
                      </div>
                      <div class="flex flex-col items-end">
                        <span class="text-sm text-gray-700" x-text="'This milestones contribution towards goal ' + milestone.percentage + '%'"></span>

                        <a :href="`{{ url_for('goals.milestone_view') }}?milestone_id=${milestone.id}`"
                           class="mt-2 text-blue-500 hover:underline text-sm">
                             Manage Milestone
                        </a>

                      </div>
                    </div>
                  </li>
                </template>
              </template>
              <template x-if="!selectedGoal.milestones?.length">
                <p class="text-gray-500 italic">No milestones yet.</p>
              </template>
            </ul>
          </div>
        </template>
      </div>
    </template>

    <!-- When no goal is selected -->
    <template x-if="!selectedGoal && !addingGoal">
      <div class="text-gray-500 italic text-center mt-20"><-- Select the goal you wish to edit</div>
    </template>

    <!-- Add New Goal when no goal is selected -->
    <template x-if="!selectedGoal && addingGoal">
      <div class="bg-white p-4 rounded shadow space-y-4">
        <input type="text" x-model="goalForm.name" placeholder="Goal name" class="border p-2 w-full rounded" />
        <input type="text" x-model="goalForm.motivation" placeholder="Why are you pursuing this goal?" class="border p-2 w-full rounded" />

        <label class="flex items-center space-x-2">
          <input type="checkbox" x-model="goalForm.has_milestones" class="accent-green-500" />
          <span>Has milestones?</span>
        </label>

        <div class="flex flex-wrap gap-2">
          <template x-for="color in availableColors" :key="color">
            <div
              :style="`background-color: ${color}`"
              class="w-6 h-6 rounded-full cursor-pointer border-2"
              :class="{'border-black': goalForm.color === color}"
              @click="goalForm.color = color"
            ></div>
          </template>
        </div>

        <div class="flex space-x-2">
          <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded" @click="saveGoal">Save</button>
          <button class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded" @click="resetGoalForm">Cancel</button>
        </div>
      </div>
    </template>
  </div>
</div>

<script>
function goalPage() {
  return {
    csrfToken: document.querySelector('meta[name="csrf-token"]').getAttribute('content'),
    goals: [],
    completedGoals: [],
    selectedGoal: null,
    addingGoal: false,
    editingGoal: false,
    goalForm: {
      id: null,
      name: '',
      color: '',
      motivation: '',
      has_milestones: false
    },
    availableColors: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'],

    async init() {
      await this.fetchGoals();
    },

   async fetchGoals() {
  try {
    const res = await fetch('/api/goals/full');
    const data = await res.json();
    this.goals = data.current_goals;
    this.completedGoals = data.completed_goals;
  } catch (err) {
    console.error('Failed to fetch goals:', err);
  }
},
async markGoalIncomplete(goal) {
  try {
    const res = await fetch(`/api/goals/${goal.id}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': this.csrfToken
      },
      body: JSON.stringify({ completed: false })
    });

    if (!res.ok) throw new Error('Failed to update goal');

    // Move goal back to current goals
    this.completedGoals = this.completedGoals.filter(g => g.id !== goal.id);
    this.goals.push(goal);
    goal.completed = false;
  } catch (err) {
    console.error('Error marking goal incomplete:', err);
    alert('Failed to unmark goal as achieved.');
  }
},
    selectGoal(goal) {
      this.selectedGoal = goal;
      this.resetGoalForm();
    },

    startAddGoal() {
      this.selectedGoal = null;
      this.resetGoalForm();
      this.addingGoal = true;
    },

    editGoal(goal) {
      this.goalForm = {
        ...goal,
        has_milestones: goal.milestones_enabled
      };
      this.editingGoal = true;
    },

    resetGoalForm() {
      this.goalForm = { id: null, name: '', color: '', motivation: '', has_milestones: false };
      this.addingGoal = false;
      this.editingGoal = false;
    },

    async saveGoal() {
      if (!this.goalForm.name || !this.goalForm.color) return;

      try {
        let res;
        if (this.editingGoal) {
          res = await fetch(`/api/goals/${this.goalForm.id}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': this.csrfToken
            },
            body: JSON.stringify({
              name: this.goalForm.name,
              description: '',
              color: this.goalForm.color,
              motivation: this.goalForm.motivation,
              milestones_enabled: this.goalForm.has_milestones
            })
          });
          const updated = await res.json();
          const idx = this.goals.findIndex(g => g.id === updated.id);
          this.goals.splice(idx, 1, updated);
          this.selectedGoal = updated;
        } else {
          res = await fetch('/api/goals', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': this.csrfToken
            },
            body: JSON.stringify({
              name: this.goalForm.name,
              description: '',
              color: this.goalForm.color,
              motivation: this.goalForm.motivation,
              milestones_enabled: this.goalForm.has_milestones
            })
          });
          const created = await res.json();
          this.goals.push(created);
          this.selectedGoal = created;

          if (!this.goalForm.has_milestones) {
            const milestoneRes = await fetch('/milestones', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': this.csrfToken
              },
              body: JSON.stringify({
                goal_id: created.id,
                name: 'Primary Goal Track',
                color: created.color,
                deadline: null,
                percentage: 100
              })
            });
            const milestone = await milestoneRes.json();
            this.selectedGoal.milestones = [milestone];
          }
        }

        this.resetGoalForm();
      } catch (err) {
        console.error('Failed to save goal:', err);
      }
    },

    async deleteGoal(goal) {
      if (!confirm("Are you sure you want to delete this goal?")) return;
      try {
        await fetch(`/api/goals/${goal.id}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': this.csrfToken
          }
        });
        this.goals = this.goals.filter(g => g.id !== goal.id);
        if (this.selectedGoal?.id === goal.id) {
          this.selectedGoal = null;
        }
      } catch (err) {
        console.error('Failed to delete goal:', err);
      }
    }
  };
}
</script>
{% endblock %}
