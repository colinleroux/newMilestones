{% extends "layout.html" %}

{% block content %}
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">🎯 Manage your Milestones</h1>
  <a href="{{ url_for('goals.dashboard') }}"
     class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition">
    Dashboard
  </a>
</div>

<div class="min-h-screen flex flex-col lg:flex-row" x-data="milestoneApp()" x-init="init(); autoSelectGoalFromHash();">
  <!-- Goals List -->
  <div class="lg:w-1/3 w-full p-4 space-y-2 overflow-y-auto">
    <h2 class="text-xl font-bold mb-4">Your Goals</h2>

    <template x-for="goal in goals" :key="goal.id">
      <div class="bg-white rounded-xl shadow p-4 border-l-8 cursor-pointer hover:bg-gray-50" :style="`border-color: ${goal.color}`" @click="selectedGoal = goal; selectedMilestone = goal.milestones[0] || null">
        <h3 class="text-lg font-semibold" x-text="goal.name"></h3>
      </div>
    </template>
  </div>

  <!-- Milestones and Controls -->
<div class="lg:w-2/3 w-full p-4" x-show="selectedGoal" x-transition>
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 p-4 border rounded-lg bg-gray-50 shadow-sm">

    <!-- Left: Goal name + Milestone Allocation -->
    <div class="flex flex-col md:flex-row md:items-center md:space-x-4 w-full">
  <!-- Goal Name -->
  <h2 class="text-lg font-bold text-gray-800 truncate" x-text="'Goal: ' + selectedGoal.name"></h2>

  <!-- Allocation Indicator -->
  <div class="flex items-center space-x-2 ml-4 mt-1 md:mt-0">
    <span
      class="w-4 h-4 rounded-full"
      :class="(selectedGoal.milestones.reduce((sum, m) => sum + (m.percentage || 0), 0) === 100)
                ? 'bg-green-500' : 'bg-red-500'">
    </span>
    <span class="text-sm font-medium text-gray-700"
          x-text="(selectedGoal.milestones.reduce((sum, m) => sum + (m.percentage || 0), 0) === 100)
                   ? 'Fully Allocated'
                   : 'Incomplete Allocation'">
    </span>
  </div>
</div>


    <!-- Right: Add Milestone Button -->
    <div class="flex justify-end w-full md:w-auto">
      <button
        @click="showAddMilestoneForm = !showAddMilestoneForm; editMode = false"
        class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition"
      >
        + Add Milestone
      </button>
    </div>
  </div>




      <!-- Goal Progress Bar -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mt-2 mb-1">Goal Progress Breakdown</label>
        <div class="flex h-6 rounded overflow-hidden border border-gray-300">
          <template x-for="milestone in selectedGoal.milestones" :key="milestone.id">
            <div class="h-full flex items-center justify-center text-xs font-semibold text-white whitespace-nowrap overflow-hidden"
       :style="`width: ${milestone.percentage}%; background-color: ${milestone.color}; opacity: 0.8`"
       :title="milestone.name + ' - ' + milestone.percentage + '%'">
  <span x-show="milestone.percentage >= milestone.name.length * 1.6"
          x-text="milestone.name">
    </span>
  </div>
          </template>
          <div class="h-full bg-gray-200"
               :style="`width: ${100 - selectedGoal.milestones.reduce((sum, m) => sum + (m.percentage || 0), 0)}%;`"
               title="Remaining unallocated %"></div>

        </div>
       <div class="mt-3 p-3 rounded-lg bg-gray-50 border text-sm">
  <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
    <div>
      <span class="font-semibold text-gray-700">Allocation remaining:</span>
      <span class="text-gray-800 text-base"
            x-text="100 - selectedGoal.milestones.reduce((sum, m) => sum + (m.percentage || 0), 0) + '%'">
      </span>
    </div>
    <template x-if="selectedMilestone">
  <div>
    <span class="font-semibold text-gray-700">This milestone:</span>
    <span class="text-gray-800 text-base" x-text="selectedMilestone.percentage + '%'"></span>
  </div>
</template>
  </div>
</div>
      </div>

      <!-- Milestone List with Sliders -->
      <template x-for="milestone in selectedGoal.milestones" :key="milestone.id">
        <div class="border-t pt-4">
          <div class="flex justify-between items-center">
            <h3 class="text-md font-semibold" x-text="milestone.name"></h3>
            <p class="text-sm text-gray-500" x-text="milestone.deadline ? `Deadline: ${milestone.deadline}` : 'No deadline'"></p>
            <div class="flex space-x-2">
              <button @click="selectMilestone(selectedGoal, milestone); editMilestone(milestone)"
                      class="text-blue-500 text-sm hover:underline">Edit</button>
              <button @click="selectMilestone(selectedGoal, milestone); deleteMilestone()"
                      class="text-red-500 text-sm hover:underline">Delete</button>
            </div>
          </div>

          <input type="range"
                 min="0"
                 :max="maxPercentage()"
                 step="1"
                 x-model.number="milestone.percentage"

                 @input="selectedMilestone = milestone; validatePercentages(); updateMilestonePercentage();"
                 class="w-full mt-2 appearance-none h-2 rounded bg-gray-200"
                 :style="`background: linear-gradient(to right, ${milestone.color} 0%, ${milestone.color} ${milestone.percentage}%, #E5E7EB ${milestone.percentage}%, #E5E7EB 100%)`"
                 :disabled="maxPercentage() === 0">
          <div class="text-sm text-gray-700 mt-1">
      <!-- Displaying this milestone's percentage -->
<div class="text-sm text-gray-700 mt-1">
  <span class="text-gray-800 text-base" x-text="milestone.percentage + '%'"></span>
</div>
          </div></div>
      </template>

      <!-- Add New Milestone -->
      <div class="mt-6 border-t pt-4" x-show="showAddMilestoneForm" x-transition>
        <h4 class="font-semibold text-sm mb-2">Add New Milestone</h4>
        <input type="text"
               placeholder="Milestone name"
               class="w-full p-2 border rounded mb-2 text-sm"
               x-model="selectedGoal.newMilestoneName">
          <!-- Color Picker -->
  <div class="flex flex-wrap gap-2 mb-2">
    <template x-for="color in getAvailableMilestoneColors(selectedGoal)" :key="color">
      <div :style="`background-color: ${color}`"
           class="w-6 h-6 rounded-full cursor-pointer border-2"
           :class="{'border-black': selectedGoal.newMilestoneColor === color}"
           @click="selectedGoal.newMilestoneColor = color"></div>
    </template>
  </div>

  <!-- ✅ Move this here -->
  <label class="block text-sm text-gray-700 mt-2">Due Date</label>
  <input type="date"
         x-model="selectedGoal.newMilestoneDueDate"
         :min="minAllowedDate"
         class="w-full p-2 border rounded text-sm" />

  <button @click="createMilestone(selectedGoal)"
          class="bg-blue-500 text-white text-sm mt-2 px-3 py-1 rounded hover:bg-blue-600">
    Add Milestone
  </button>
          <button
  @click="
    showAddMilestoneForm = false;
    selectedGoal.newMilestoneName = '';
    selectedGoal.newMilestoneColor = null;
    selectedGoal.newMilestoneDueDate = null;
  "
  class="bg-gray-500 text-white text-sm mt-2 px-3 py-1 rounded hover:bg-red-600"
>
  Cancel
</button>
</div>

      <!-- Edit Milestone Form -->
      <div class="mt-6" x-show="editMode" x-transition>
        <div class="bg-gray-50 p-4 rounded-xl border space-y-4">
          <h3 class="text-lg font-semibold text-gray-800">Edit Milestone</h3>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Milestone Name</label>
            <input type="text"
                   x-model="form.name"
                   class="w-full p-2 border rounded text-sm"
                   placeholder="Enter milestone name">
          </div>

          <!-- Color Picker -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Milestone Color</label>
            <div class="flex flex-wrap gap-2 mb-2">
              <template x-for="color in getAvailableMilestoneColors(selectedGoal)" :key="color">
                <div :style="`background-color: ${color}`"
                     class="w-6 h-6 rounded-full cursor-pointer border-2"
                     :class="{'border-black': form.color === color}"
                     @click="form.color = color"></div>
 </template>  </div>
                <!-- added -->
                <label class="block text-sm text-gray-700">Due Date</label>
<input type="date"
       x-model="form.deadline"
       :min="minAllowedDate"
       class="w-full p-2 border rounded text-sm" />

                <!-- added end -->


          </div>

          <div class="flex gap-2 mt-4">
            <button @click="saveMilestone"
                    class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
              Save
            </button>
            <button @click="cancelEdit"
                    class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>





<script>
  function milestoneApp() {
    return {
      csrfToken: document.querySelector('meta[name="csrf-token"]').getAttribute('content'),
      goals: {{ goal_data | tojson }},
      selectedGoal: null,
      selectedMilestone: null,
      showAddMilestoneForm: false,
      sliderActive: false,
      milestoneColors: ['#f87171', '#fb923c', '#facc15', '#4ade80', '#34d399', '#60a5fa', '#a78bfa', '#f472b6', '#67e8f9', '#6ee7b7', '#fde68a', '#c084fc'],
      form: {
        name: '',
        percentage: 0,
        deadline: '',
        color: ''
      },
      editMode: false,

      init() {
        if (this.goals.length > 0 && this.goals[0].milestones.length > 0) {
          this.selectedGoal = this.goals[0];
          this.selectedMilestone = this.goals[0].milestones[0];
        }
        this.goals.forEach(goal => {
          goal.milestones = goal.milestones || [];
          goal.newMilestoneName = '';
          goal.newMilestoneColor = '';
          goal.showAddForm = false;
          goal.milestones.forEach(m => {
            if (m.percentage === null || m.percentage === undefined) {
              m.percentage = 0;
            }

          });
        });
        // Auto-edit milestone if ID is present in URL
const params = new URLSearchParams(window.location.search);
const milestoneId = params.get('milestone_id');

if (milestoneId) {
  for (const goal of this.goals) {
    const found = goal.milestones.find(m => String(m.id) === milestoneId);
    if (found) {
      this.selectMilestone(goal, found);
      this.editMilestone(found);
      break;
    }
  }
}
      },

      selectMilestone(goal, milestone) {
        this.selectedGoal = goal;
        this.selectedMilestone = milestone;
      },

      editMilestone(milestone = null) {
        const target = milestone || this.selectedMilestone;
        if (!target) return;

        this.selectedMilestone = target;
        this.form = {
          name: target.name,
          percentage: target.percentage || 0,
          deadline: (() => {
  const dateStr = target.deadline || target.deadline;
  return (typeof dateStr === 'string' && dateStr.includes('T'))
    ? dateStr.split('T')[0]
    : dateStr || '';
})(),
          color: target.color
        };
        this.editMode = true;
        this.showAddMilestoneForm = false;
      },

      deleteMilestone() {
        if (!this.selectedMilestone || !this.selectedGoal) return;

        if (!confirm(`Are you sure you want to delete "${this.selectedMilestone.name}"?`)) return;

        fetch(`/milestones/${this.selectedMilestone.id}`, {
          method: 'DELETE',
          headers: {
            'X-CSRFToken': this.csrfToken
          }
        })
        .then(res => {
          if (!res.ok) throw new Error("Failed to delete milestone.");
          return res.json();
        })
        .then(() => {
          this.selectedGoal.milestones = this.selectedGoal.milestones.filter(
            m => m.id !== this.selectedMilestone.id
          );

          this.selectedMilestone = this.selectedGoal.milestones.length > 0
            ? this.selectedGoal.milestones[0]
            : null;
        })
        .catch(err => {
          console.error(err);
          alert("Could not delete milestone.");
        });
      },
      minAllowedDate: (() => {
        const date = new Date();
        date.setDate(date.getDate() + 7);
        return date.toISOString().split('T')[0]; // Format YYYY-MM-DD
        })(),

      saveMilestone() {
        if (!this.selectedMilestone || !this.selectedGoal) return;
        const dueDate = new Date(this.form.deadline);
        const minDate = new Date();
        minDate.setDate(minDate.getDate() + 7);

        if (dueDate < minDate) {
          alert("Due date must be at least 7 days from today.");
          return;
        }
        const isColorUsed = this.selectedGoal.milestones.some(
          m => m.id !== this.selectedMilestone.id && m.color === this.form.color
        ) || this.selectedGoal.color === this.form.color;

        if (isColorUsed) {
          alert("This color is already used by another milestone or the goal.");
          return;
        }

        const payload = {
  name: this.form.name,
  percentage: this.form.percentage,
  deadline: this.form.deadline,
  color: this.form.color,
  goal_id: this.selectedGoal.id  // 👈 required for POST
};


        fetch(`/milestones/${this.selectedMilestone.id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': this.csrfToken
          },
          body: JSON.stringify(payload)
        })
        .then(res => {
          if (!res.ok) throw new Error("Update failed");
          return res.json();
        })
        .then(updated => {
           if (updated.deadline) {
    const parsedDate = new Date(updated.deadline);
    updated.deadline = parsedDate.toISOString().split('T')[0]; // "2025-09-26"
  }
          const index = this.selectedGoal.milestones.findIndex(m => m.id === updated.id);
          if (index !== -1) {
            this.selectedGoal.milestones[index] = updated;
            this.selectedMilestone = updated;
          }
          this.resetForm();
        })
        .catch(err => {
          console.error(err);
          alert("Could not update milestone.");
        });
      },

      createMilestone(goal) {
        if (!goal.newMilestoneName || !goal.newMilestoneColor || !goal.newMilestoneDueDate) {
          alert('Please enter a name , date and select a color');
          return;
        }
        const dueDate = new Date(goal.newMilestoneDueDate);
        const minDate = new Date();
        minDate.setDate(minDate.getDate() + 7);

        if (dueDate < minDate) {
          alert("Due date must be at least 7 days from today.");
          return;
        }
        fetch('/milestones', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': this.csrfToken
          },
          body: JSON.stringify({
            goal_id: goal.id,
            name: goal.newMilestoneName,
            color: goal.newMilestoneColor,
            deadline: goal.newMilestoneDueDate
          })
        })
        .then(res => {
          if (!res.ok) throw new Error("Failed to add milestone");
          return res.json();
        })
        .then(data => {
          goal.milestones.push(data);
          goal.newMilestoneName = '';
          goal.newMilestoneColor = '';
          goal.newMilestoneDueDate = '';
        })
        .catch(err => {
          console.error(err);
          alert("Could not save milestone.");
        });
        this.showAddMilestoneForm = false;
      },
autoSelectGoalFromHash() {
  const hash = window.location.hash;
  if (hash && hash.startsWith('#goal-')) {
    const goalId = parseInt(hash.replace('#goal-', ''));
    const match = this.goals.find(g => g.id === goalId);
    if (match) {
      this.selectedGoal = match;
      this.selectedMilestone = match.milestones[0] || null;
    }
  }
},
      getAvailableMilestoneColors(goal) {
        const usedColors = goal.milestones.map(m => m.color);

        if (this.editMode && this.selectedMilestone) {
          const index = usedColors.indexOf(this.selectedMilestone.color);
          if (index !== -1) {
            usedColors.splice(index, 1);
          }
        }

        return this.milestoneColors.filter(c => !usedColors.includes(c));
      },

      updateMilestonePercentage() {
        if (!this.selectedMilestone || !this.selectedMilestone.id) return;

        fetch(`/milestones/${this.selectedMilestone.id}/percentage`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': this.csrfToken
          },
          body: JSON.stringify({
            percentage: this.selectedMilestone.percentage
          })
        })
        .then(res => {
          if (!res.ok) throw new Error("Failed to update percentage");
          return res.json();
        })
        .then(data => {
          console.log("Updated:", data);
        })
        .catch(err => {
          console.error("Failed to save milestone percentage", err);
          alert("Could not save milestone change.");
        });
      },

      validatePercentages() {
        if (!this.selectedGoal || !this.selectedMilestone) return;

        const total = this.selectedGoal.milestones.reduce((sum, m) => {
          const value = (m.id === this.selectedMilestone.id)
            ? this.selectedMilestone.percentage
            : m.percentage || 0;
          return sum + value;
        }, 0);

        if (total > 100) {
          const allowed = Math.max(0, 100 - (total - this.selectedMilestone.percentage));
          alert(`Total milestone contribution exceeds 100%. Adjusting this milestone to ${allowed}%.`);
          this.selectedMilestone.percentage = allowed;
        }
      },

      maxPercentage() {
        if (!this.selectedGoal || !this.selectedMilestone) return 100;

        const othersTotal = this.selectedGoal.milestones.reduce((sum, m) => {
          return m.id !== this.selectedMilestone.id ? sum + (m.percentage || 0) : sum;
        }, 0);

        return Math.max(0, 100 - othersTotal);
      },

      resetForm() {
        this.form = {
          name: '',
          percentage: '',
          deadline: '',
          color: ''
        };
        this.editMode = false;
      },
      cancelEdit() {
        this.resetForm();
      }
    };
  }
</script>

{% endblock %}
