{% extends "layout.html" %}

{% block content %}
<div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
  <h1 class="text-2xl font-bold">Step Planner</h1>
  <div class="flex flex-wrap gap-2">
    <a href="{{ url_for('goals.dashboard') }}"
       class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition">
      Dashboard
    </a>
  </div>
</div>

<div class="min-h-screen flex flex-col lg:flex-row" x-data="plannerApp()">
  <div class="w-full space-y-4 rounded-2xl border border-slate-200 bg-white p-4 lg:w-1/3 lg:overflow-y-auto">
    <h2 class="text-xl font-bold mb-4">Select a goal to add steps</h2>

    <template x-if="goals.length === 0">
      <div class="rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-5 text-sm text-slate-600">
        <p class="font-medium text-slate-800">There are no active goals to plan steps for yet.</p>
        <p class="mt-2">Create a new goal first, then you can break it into small, achievable steps here.</p>
        <a href="{{ url_for('goals.goal_planner') }}"
           class="mt-4 inline-flex rounded-full bg-green-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-green-700">
          Add a new goal
        </a>
      </div>
    </template>

    <template x-for="goal in goals" :key="goal.id">
      <div class="bg-white rounded-xl shadow p-4 border-l-8 mb-2" :style="`border-left-color: ${goal.color}`">
        <div @click="toggleGoal(goal)" class="cursor-pointer flex justify-between items-center">
          <div>
            <h3 class="text-lg font-semibold flex items-center space-x-2">
              <span x-text="goal.name"></span>
              <template x-if="goal.progress === 100">
                <span class="text-green-600 text-xs font-semibold border border-green-600 px-2 py-0.5 rounded-full">
                  Achieved
                </span>
              </template>
            </h3>
            <p class="text-sm text-gray-500 italic" x-text="goal.motivation"></p>
          </div>
          <div class="text-sm text-blue-500" x-text="goal.expanded ? '-' : '+'"></div>
        </div>
      </div>
    </template>
  </div>

  <div class="w-full rounded-2xl bg-white p-4 shadow-sm lg:w-2/3" x-show="selectedGoal !== null" x-transition>
    <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <h2 class="text-xl font-bold">
        Plan for <span x-text="selectedGoal?.name"></span>
      </h2>
    </div>

    <div class="mb-4 flex flex-col gap-3">
      <div class="flex flex-wrap gap-2">
        <button @click="goToCurrentWeek" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700 transition">
          This Week
        </button>
        <button @click="goToCurrentMonth" class="bg-amber-500 text-white px-3 py-1 rounded hover:bg-amber-600 transition">
          This Month
        </button>
      </div>
      <div class="text-base font-semibold sm:text-lg" x-text="periodLabel"></div>
      <div class="flex flex-wrap gap-2">
        <button @click="changePeriod(-1)" class="bg-gray-200 text-gray-800 px-3 py-1 rounded hover:bg-gray-300 transition">
          Prev
        </button>
        <button @click="changePeriod(1)" class="bg-gray-200 text-gray-800 px-3 py-1 rounded hover:bg-gray-300 transition">
          Next
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4">
      <template x-for="day in days" :key="day.fullDate">
        <div
          class="p-4 rounded-xl shadow min-h-[200px] border border-transparent"
          :class="{
            'border-2 border-dashed border-blue-400': dragOverDay === day.fullDate,
            'bg-amber-50 border-amber-200': isPastDay(day),
            'bg-white': !isPastDay(day)
          }"
          @dragover.prevent="dragOverDay = day.fullDate"
          @dragleave="dragOverDay = null"
          @drop="handleDrop(day.fullDate)"
        >
          <h3 class="font-bold text-lg mb-1" x-text="day.label"></h3>
          <p class="text-xs text-gray-500 mb-2" x-text="day.dateFormatted"></p>

          <ul class="space-y-2 mb-2">
            <template x-for="(step, index) in weeklyPlan[day.fullDate] || []" :key="step.id">
              <li
                class="rounded px-2 py-2 text-sm"
                :style="selectedGoal ? `background-color: ${selectedGoal.color};` : ''"
                draggable="true"
                @dragstart="startDrag(day.fullDate, index)"
              >
                <div class="flex items-start justify-between gap-2 text-white">
                  <div>
                    <input type="checkbox" :checked="step.completed" @change="toggleComplete(day.fullDate, index, $event)" class="mr-1" />
                    <span x-text="step.title" :class="{'line-through': step.completed}"></span>
                  </div>
                  <button @click="removeStep(day.fullDate, step.id)" class="text-xs hover:underline">&times;</button>
                </div>
                <div x-show="step.completed">
                  <textarea
                    x-model="step.reflection"
                    @change="updateReflection(step)"
                    placeholder="Reflection..."
                    class="w-full mt-1 p-1 text-xs rounded"
                  ></textarea>
                </div>
              </li>
            </template>
          </ul>

          <template x-if="selectedGoal">
            <div class="mt-2">
              <input
                type="text"
                x-model="newStep[day.fullDate]"
                placeholder="Add step..."
                class="text-sm w-full border rounded p-1 mb-2"
              />

              <button
                @click="addStep(day.fullDate)"
                class="text-white text-xs px-2 py-1 rounded"
                :style="selectedGoal ? `background-color: ${selectedGoal.color};` : ''"
              >
                Add
              </button>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>
</div>

<script>
function plannerApp() {
  return {
    csrfToken: document.querySelector('meta[name="csrf-token"]').getAttribute('content'),
    days: [],
    goals: [],
    completedGoals: [],
    initialGoalId: {{ selected_goal_id | tojson }},
    selectedGoalId: null,
    selectedGoal: null,
    weekOffset: 0,
    monthOffset: 0,
    viewMode: 'week',
    weeklyPlan: {},
    newStep: {},
    repeatAllDays: {},
    dragData: null,
    dragOverDay: null,

    async init() {
      this.csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
      this.days = this.getVisibleDates();
      this.resetDayBuckets();
      await this.fetchGoals();

      if (this.initialGoalId !== null) {
        const initialGoal = this.goals.find(goal => goal.id === this.initialGoalId);
        if (initialGoal) {
          await this.selectGoal(initialGoal);
        }
      }
    },

    toggleGoal(goal) {
      const isCurrentlySelected = this.selectedGoal?.id === goal.id;

      this.goals.forEach(existingGoal => {
        existingGoal.expanded = false;
      });

      if (isCurrentlySelected) {
        goal.expanded = false;
        this.selectedGoal = null;
        this.selectedGoalId = null;
        this.resetDayBuckets();
        return;
      }

      goal.expanded = true;
      this.selectGoal(goal);
    },

    async selectGoal(goal) {
      this.selectedGoal = goal;
      this.selectedGoalId = goal.id;
      goal.expanded = true;
      await this.loadSteps();
    },

    async loadSteps() {
      if (!this.selectedGoal) return;

      const start = this.days[0]?.fullDate;
      const end = this.days[this.days.length - 1]?.fullDate;
      const res = await fetch(`/api/steps/range?goal_id=${this.selectedGoal.id}&start=${start}&end=${end}`);
      const data = await res.json();
      this.populateWeeklyPlan(data.steps || []);
    },

    toLocalDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    },

    isPastDay(day) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const dayDate = new Date(day.fullDate);
      dayDate.setHours(0, 0, 0, 0);

      return dayDate < today;
    },

    resetDayBuckets() {
      this.weeklyPlan = {};
      this.days.forEach(day => {
        this.weeklyPlan[day.fullDate] = [];
        this.newStep[day.fullDate] = '';
        this.repeatAllDays[day.fullDate] = false;
      });
    },

    populateWeeklyPlan(steps) {
      this.resetDayBuckets();
      for (const step of steps) {
        if (this.weeklyPlan[step.date_for]) this.weeklyPlan[step.date_for].push(step);
      }
    },

    getVisibleDates() {
      return this.viewMode === 'month' ? this.getMonthDates() : this.getWeekDates();
    },

    getWeekDates() {
      const today = new Date();
      const offsetToMonday = (today.getDay() + 6) % 7;
      const startOfWeek = new Date(today);
      startOfWeek.setDate(today.getDate() - offsetToMonday + this.weekOffset * 7);

      const weekDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

      return weekDays.map((day, index) => {
        const date = new Date(startOfWeek);
        date.setDate(startOfWeek.getDate() + index);
        return {
          label: day,
          dateFormatted: date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }),
          fullDate: this.toLocalDateString(date),
        };
      });
    },

    getMonthDates() {
      const today = new Date();
      const firstDay = new Date(today.getFullYear(), today.getMonth() + this.monthOffset, 1);
      const lastDay = new Date(firstDay.getFullYear(), firstDay.getMonth() + 1, 0);
      const numberOfDays = lastDay.getDate();

      return Array.from({ length: numberOfDays }, (_, index) => {
        const date = new Date(firstDay.getFullYear(), firstDay.getMonth(), index + 1);
        return {
          label: date.toLocaleDateString(undefined, { weekday: 'long' }),
          dateFormatted: date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }),
          fullDate: this.toLocalDateString(date),
        };
      });
    },

    async fetchGoals() {
      const res = await fetch('/api/goals/full');
      const data = await res.json();
      this.goals = data.current_goals.map(goal => ({ ...goal, expanded: false }));
      this.completedGoals = data.completed_goals.map(goal => ({ ...goal, expanded: false }));
    },

    goToCurrentWeek() {
      this.viewMode = 'week';
      this.weekOffset = 0;
      this.monthOffset = 0;
      this.days = this.getVisibleDates();
      this.resetDayBuckets();
      if (this.selectedGoal) {
        this.loadSteps();
      }
    },

    goToCurrentMonth() {
      this.viewMode = 'month';
      this.monthOffset = 0;
      this.days = this.getVisibleDates();
      this.resetDayBuckets();
      if (this.selectedGoal) {
        this.loadSteps();
      }
    },

    changePeriod(offset) {
      if (this.viewMode === 'month') {
        this.monthOffset += offset;
      } else {
        this.weekOffset += offset;
      }
      this.days = this.getVisibleDates();
      this.resetDayBuckets();
      if (this.selectedGoal) {
        this.loadSteps();
      }
    },

    async addStep(dayKey) {
      if (!this.selectedGoal) return;
      const text = this.newStep[dayKey]?.trim();
      const repeat = this.repeatAllDays[dayKey];

      if (!text) return;

      const addToDay = async (dateKey) => {
        const payload = {
          title: text,
          completed: false,
          description: '',
          reflection: '',
          date_for: dateKey
        };
        const res = await fetch(`/api/goals/${this.selectedGoal.id}/steps`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': this.csrfToken
          },
          body: JSON.stringify(payload)
        });
        const newStep = await res.json();
        this.weeklyPlan[dateKey].push({ ...newStep, color: this.selectedGoal.color });
      };

      if (!repeat) {
        await addToDay(dayKey);
      } else {
        for (const d of this.days) await addToDay(d.fullDate);
      }

      this.newStep[dayKey] = '';
      this.repeatAllDays[dayKey] = false;
    },

    async removeStep(dayKey, stepId) {
      await fetch(`/api/steps/${stepId}`, {
        method: 'DELETE',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': this.csrfToken
        }
      });
      this.weeklyPlan[dayKey] = this.weeklyPlan[dayKey].filter(s => s.id !== stepId);
    },

    async toggleComplete(dayKey, index, event) {
      const step = this.weeklyPlan[dayKey][index];
      const newCompleted = event.target.checked;
      step.completed = newCompleted;
      const res = await fetch(`/api/steps/${step.id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': this.csrfToken
        },
        body: JSON.stringify({ completed: newCompleted, title: step.title })
      });
      const updated = await res.json();
      this.weeklyPlan[dayKey][index].completed = updated.completed;
    },

    async updateReflection(step) {
      await fetch(`/api/steps/${step.id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': this.csrfToken
        },
        body: JSON.stringify({ reflection: step.reflection, title: step.title, completed: step.completed })
      });
    },

    startDrag(dayKey, index) {
      this.dragData = { fromDay: dayKey, index };
    },

    async handleDrop(targetDayKey) {
      const { fromDay, index } = this.dragData;
      const step = this.weeklyPlan[fromDay][index];
      const newDate = targetDayKey;
      await fetch(`/api/steps/${step.id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': this.csrfToken
        },
        body: JSON.stringify({ date_for: newDate, title: step.title })
      });
      this.weeklyPlan[fromDay].splice(index, 1);
      this.weeklyPlan[targetDayKey].push({ ...step, date_for: newDate });
      this.dragOverDay = null;
    },

    get periodLabel() {
      if (!this.days.length) return '';
      const [year, month, day] = this.days[0].fullDate.split('-').map(Number);
      const date = new Date(year, month - 1, day);
      if (this.viewMode === 'month') {
        return date.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
      }
      return `Week beginning ${date.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' })}`;
    }
  };
}
</script>

{% endblock %}
